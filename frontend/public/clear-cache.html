<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>清除缓存 - Leadman FWH</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 16px;
    }
    .status {
      padding: 20px;
      margin: 20px 0;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
    }
    .status.waiting {
      background: #fff3cd;
      color: #856404;
      border: 2px solid #ffc107;
    }
    .status.success {
      background: #d4edda;
      color: #155724;
      border: 2px solid #28a745;
    }
    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #dc3545;
    }
    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 16px 40px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }
    .btn:active {
      transform: translateY(0);
    }
    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      box-shadow: none;
    }
    .btn.secondary {
      background: #6c757d;
      box-shadow: 0 4px 15px rgba(108, 117, 125, 0.4);
    }
    .btn.secondary:hover {
      box-shadow: 0 6px 20px rgba(108, 117, 125, 0.6);
    }
    .steps {
      text-align: left;
      margin: 30px 0;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 12px;
    }
    .steps h3 {
      color: #333;
      margin-bottom: 15px;
    }
    .steps ol {
      margin-left: 20px;
      color: #555;
    }
    .steps li {
      margin: 10px 0;
      line-height: 1.6;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🔄</div>
    <h1>清除缓存和更新</h1>
    <p class="subtitle">如果 Dashboard 无法显示，请清除缓存并刷新</p>

    <div id="status" class="status waiting">
      等待操作...
    </div>

    <div>
      <button id="clear-btn" class="btn" onclick="clearAllCaches()">
        🗑️ 清除所有缓存
      </button>
      <button class="btn secondary" onclick="window.location.href='/'">
        🏠 返回首页
      </button>
    </div>

    <div class="steps">
      <h3>📋 手动清除步骤（如果自动清除失败）：</h3>
      <ol>
        <li><strong>电脑（Chrome/Edge）</strong>：
          <br>按 <code>Ctrl + Shift + Delete</code>
          <br>选择 "缓存的图像和文件" 和 "Cookie"
          <br>点击 "清除数据"
        </li>
        <li><strong>手机（Chrome）</strong>：
          <br>菜单（⋮）→ 设置 → 隐私 → 清除浏览数据
          <br>选择 "缓存的图像和文件" 和 "Cookie"
          <br>点击 "清除数据"
        </li>
        <li><strong>完成后</strong>：
          <br>完全关闭浏览器（所有窗口）
          <br>重新打开并访问网站
        </li>
      </ol>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const clearBtn = document.getElementById('clear-btn');

    function updateStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`;
    }

    async function clearAllCaches() {
      clearBtn.disabled = true;
      updateStatus('正在清除缓存...', 'waiting');

      let clearedCount = 0;

      try {
        // 1. Unregister all service workers
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          for (const registration of registrations) {
            await registration.unregister();
          }
          clearedCount++;
        }

        // 2. Clear all caches
        if ('caches' in window) {
          const cacheNames = await caches.keys();
          for (const cacheName of cacheNames) {
            await caches.delete(cacheName);
          }
          clearedCount++;
        }

        // 3. Clear localStorage
        localStorage.clear();
        clearedCount++;

        // 4. Clear sessionStorage
        sessionStorage.clear();
        clearedCount++;

        // 5. Clear IndexedDB
        if ('indexedDB' in window) {
          const databases = await indexedDB.databases();
          for (const db of databases) {
            indexedDB.deleteDatabase(db.name);
          }
          clearedCount++;
        }

        updateStatus(`✅ 清除成功！已清除 ${clearedCount} 项缓存`, 'success');

        // Show reload button
        setTimeout(() => {
          if (confirm('缓存已清除！\n\n点击 "确定" 重新加载页面获取最新代码。')) {
            window.location.reload(true);
          }
        }, 1000);

      } catch (error) {
        console.error('清除缓存失败:', error);
        updateStatus(`❌ 清除失败: ${error.message}`, 'error');
        clearBtn.disabled = false;
      }
    }

    // Auto-check current cache status
    window.addEventListener('load', async () => {
      let cacheInfo = [];

      if ('serviceWorker' in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        cacheInfo.push(`Service Workers: ${registrations.length}`);
      }

      if ('caches' in window) {
        const cacheNames = await caches.keys();
        cacheInfo.push(`Caches: ${cacheNames.length}`);
      }

    });
  </script>
</body>
</html>
