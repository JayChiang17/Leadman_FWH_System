# ──────────────────────────────────────────────────────────
# nginx — SPA serve + reverse proxy to FastAPI backend
# ──────────────────────────────────────────────────────────

# Upstream backend (Docker Compose service name)
upstream backend {
    server backend:8000;
}

# ── HTTP → HTTPS redirect ─────────────────────────────
server {
    listen 80;
    server_name _;

    # Health check endpoint stays on HTTP
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ──────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    # SSL certificates (self-signed for internal network)
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── API reverse proxy ─────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # File upload support (Excel exports, AI documents)
        client_max_body_size 50m;

        # Longer timeout for AI queries and report generation
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── WebSocket reverse proxy ───────────────────────
    location /realtime/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;

        # WebSocket keepalive
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── React SPA fallback ────────────────────────────
    # Static assets — long cache (hashed filenames)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service worker — no cache
    location = /service-worker.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Manifest — short cache
    location = /manifest.json {
        expires 1h;
        try_files $uri =404;
    }

    # All other routes → index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
