# ──────────────────────────────────────────────────────────────────────────────
# CI — runs on every push / PR
# Checks: frontend build, backend lint, docker image build
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend: install → test → build ────────────────────────────────────────
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Production build
        run: npm run build
        env:
          REACT_APP_API_BASE: /api

  # ── Backend: syntax check + import validation ────────────────────────────────
  backend:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8
          # Install only lightweight deps for lint (skip torch/ML packages)
          pip install fastapi uvicorn pydantic psycopg2-binary python-jose passlib

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names; ignore line length and formatting
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=__pycache__,.venv,venv,ml/models

  # ── Docker: validate both images build without errors ───────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          build-args: |
            REACT_APP_API_BASE=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
