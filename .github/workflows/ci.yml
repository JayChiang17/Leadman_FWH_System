# ──────────────────────────────────────────────────────────────────────────────
# CI — runs on every push / PR
# Checks: frontend build, backend lint, docker image build
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Opt into Node.js 24 now to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Frontend: install → test → build ────────────────────────────────────────
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Production build
        run: npm run build
        env:
          REACT_APP_API_BASE: /api
          # Increase heap for large bundles (plotly + recharts)
          NODE_OPTIONS: "--max-old-space-size=4096"
          # Separate ESLint from build; CI=true would treat all warnings as errors
          DISABLE_ESLINT_PLUGIN: "true"

  # ── Backend: syntax check + import validation ────────────────────────────────
  backend:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install flake8
        run: pip install --upgrade pip flake8

      - name: Lint with flake8
        run: |
          # E9   = runtime/syntax errors (SyntaxError, IndentationError …)
          # F63  = invalid escape sequences / assert issues
          # F7   = statement errors
          # F821 = undefined name
          flake8 . --count --select=E9,F63,F7,F821 --show-source --statistics \
            --exclude=__pycache__,.venv,venv,ml/models,migrations

  # ── Docker: validate both images build without errors ───────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          build-args: |
            REACT_APP_API_BASE=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
