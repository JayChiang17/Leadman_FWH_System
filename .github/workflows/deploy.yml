# ──────────────────────────────────────────────────────────────────────────────
# CD — runs on push to main
# Builds images → pushes to local registry (192.168.10.100:5000)
# Then pulls & restarts containers — all on the self-hosted Windows LAN runner.
#
# Required GitHub Secrets:
#   REGISTRY_USER       — local registry username (e.g. leadman)
#   REGISTRY_PASSWORD   — local registry password
#   DEPLOY_PATH         — project folder on server (e.g. C:\Users\admin\Desktop)
#   POSTGRES_PASSWORD   — production DB password
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: 192.168.10.100:5000

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: self-hosted
    environment: production
    defaults:
      run:
        shell: powershell

    steps:
      - uses: actions/checkout@v4

      - name: Login to local registry
        run: |
          docker login $env:REGISTRY -u "${{ secrets.REGISTRY_USER }}" -p "${{ secrets.REGISTRY_PASSWORD }}"

      - name: Set image tag (short SHA)
        id: tag
        run: |
          $sha = git rev-parse --short HEAD
          Add-Content -Path $env:GITHUB_OUTPUT -Value "sha=$sha"

      - name: Build & push backend
        run: |
          $sha = "${{ steps.tag.outputs.sha }}"
          docker build -t "$env:REGISTRY/leadman-backend:$sha" -t "$env:REGISTRY/leadman-backend:latest" ./backend
          docker push "$env:REGISTRY/leadman-backend:$sha"
          docker push "$env:REGISTRY/leadman-backend:latest"

      - name: Build & push frontend
        run: |
          $sha = "${{ steps.tag.outputs.sha }}"
          docker build --build-arg REACT_APP_API_BASE=/api -t "$env:REGISTRY/leadman-frontend:$sha" -t "$env:REGISTRY/leadman-frontend:latest" ./frontend
          docker push "$env:REGISTRY/leadman-frontend:$sha"
          docker push "$env:REGISTRY/leadman-frontend:latest"

      - name: Pull latest code
        run: |
          git -C "${{ secrets.DEPLOY_PATH }}" fetch origin main
          git -C "${{ secrets.DEPLOY_PATH }}" checkout main
          git -C "${{ secrets.DEPLOY_PATH }}" reset --hard origin/main

      - name: Restart containers
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          docker compose -f "${{ secrets.DEPLOY_PATH }}\docker-compose.yml" pull
          docker compose -f "${{ secrets.DEPLOY_PATH }}\docker-compose.yml" up -d --remove-orphans

      - name: Prune old images
        run: docker image prune -f

      - name: Done
        run: |
          $sha = "${{ steps.tag.outputs.sha }}"
          Write-Host "Deployed $sha at $(Get-Date)"
