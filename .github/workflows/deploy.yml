# ──────────────────────────────────────────────────────────────────────────────
# CD — runs on push to main (after CI passes)
# Builds images → pushes to GitHub Container Registry (ghcr.io)
# Then SSHes into the production server to pull & restart
#
# Required GitHub Secrets:
#   POSTGRES_PASSWORD   — production DB password
#   DEPLOY_HOST         — server IP (e.g. 192.168.10.100)
#   DEPLOY_USER         — SSH user (e.g. admin)
#   DEPLOY_SSH_KEY      — private SSH key (run: ssh-keygen -t ed25519)
#   DEPLOY_PATH         — project folder on server (e.g. /opt/leadman)
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND:  ghcr.io/${{ github.repository_owner }}/leadman-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/leadman-frontend

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    outputs:
      tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_FRONTEND }}:latest
          build-args: |
            REACT_APP_API_BASE=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production   # adds manual approval gate in GitHub UI (optional)

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Pull latest code
            git pull origin main

            # Pull latest images
            docker compose pull

            # Restart with zero-downtime (recreate only changed containers)
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
              docker compose up -d --remove-orphans

            # Remove old dangling images
            docker image prune -f

            echo "✅ Deployed ${{ needs.build-and-push.outputs.tag }} at $(date)"
